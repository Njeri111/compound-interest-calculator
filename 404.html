<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – Compound Interest Calculator</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #FAF7F2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 20%, rgba(27,94,69,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201,146,47,.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .card {
      background: rgba(255,255,254,.92);
      border: 1px solid rgba(226,221,214,.75);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow:
        0 1px 2px rgba(28,35,51,.04),
        0 8px 24px rgba(28,35,51,.08),
        0 24px 64px rgba(28,35,51,.1);
      position: relative;
      z-index: 1;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #1B5E45;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 24px rgba(27,94,69,.3);
    }
    .code {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 5rem;
      font-weight: 700;
      color: #1B5E45;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      color: #1C2333;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    p {
      color: #5A6478;
      font-size: 0.9375rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1B5E45;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      padding: 0.8125rem 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9375rem;
      box-shadow: 0 2px 8px rgba(27,94,69,.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(27,94,69,.4);
    }
    .btn:active { transform: translateY(0); }
    .btn:focus-visible { outline: 3px solid rgba(27,94,69,.4); outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="code" aria-label="Error 404">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. It may have been moved or the URL might be wrong.</p>
    <a href="/" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to Calculator
    </a>
  </div>
</body>
</html>
