<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1B5E45"/>
  <!-- Upward trend chart line -->
  <polyline
    points="10,46 22,34 32,38 44,20 54,16"
    fill="none"
    stroke="rgba(255,255,255,0.35)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Main trend line -->
  <polyline
    points="10,46 22,34 32,38 44,20 54,16"
    fill="none"
    stroke="#FFD166"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Arrow head at end -->
  <polyline
    points="47,14 54,16 52,23"
    fill="none"
    stroke="#FFD166"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Dollar sign -->
  <text x="18" y="52" font-family="Georgia, serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.6)">$</text>
</svg>
