# ── Netlify Deployment Config ──────────────────────────────────────────────
[build]
  publish = "."

# ── Security + Performance Headers (all routes) ───────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://placehold.co; connect-src 'self'; frame-ancestors 'none';"

# ── HTML — short cache, always revalidate ─────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Static assets — long cache ────────────────────────────────────────────
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirects ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/index"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/calculator"
  to     = "/"
  status = 301

# ── Custom 404 ────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
